# GlassFlow MCP Server — Kubernetes Deployment
#
# Customize the values marked CHANGEME before applying.
#
# Apply:
#   kubectl apply -f deployment.yaml -f service.yaml
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: glassflow-mcp
  namespace: glassflow          # CHANGEME: namespace where GlassFlow is installed
  labels:
    app: glassflow-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glassflow-mcp
  template:
    metadata:
      labels:
        app: glassflow-mcp
    spec:
      # Uncomment if your image is in a private registry:
      # imagePullSecrets:
      #   - name: my-registry-secret
      containers:
        - name: glassflow-mcp
          image: ghcr.io/glassflow/glassflow-mcp-server:latest  # CHANGEME: your image
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: sse
              protocol: TCP
          env:
            # CHANGEME: GlassFlow API URL (in-cluster service address)
            - name: GLASSFLOW_API_URL
              value: "http://glassflow-api.glassflow.svc.cluster.local:8081"

            # CHANGEME: VictoriaMetrics URL (leave empty to disable metrics tools)
            - name: VICTORIAMETRICS_URL
              value: "http://glassflow-victoria-metrics-single-server.glassflow.svc.cluster.local:8428"

            # CHANGEME: VictoriaLogs URL (leave empty to disable log tools)
            - name: VICTORIALOGS_URL
              value: "http://glassflow-victoria-logs-single-server.glassflow.svc.cluster.local:9428"

            - name: MCP_PORT
              value: "8080"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
