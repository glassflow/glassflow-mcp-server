# GlassFlow MCP Server — Kubernetes Ingress (optional)
#
# Exposes the MCP SSE endpoint externally. Only needed if you want
# to connect Claude Code without port-forwarding.
#
# IMPORTANT: Protect this endpoint with authentication (e.g. Cloudflare
# Access, OAuth2 Proxy, basic auth) — the MCP server has no built-in
# auth and exposes pipeline management operations.
#
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: glassflow-mcp
  namespace: glassflow            # CHANGEME: must match deployment namespace
  annotations:
    # Disable ssl-redirect if TLS is terminated upstream (e.g. Cloudflare).
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # SSE connections are long-lived — increase timeouts.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Disable buffering so SSE events stream through immediately.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx         # CHANGEME: your ingress class
  rules:
    - host: mcp.example.com       # CHANGEME: your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: glassflow-mcp
                port:
                  number: 8080
