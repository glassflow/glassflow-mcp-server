# GlassFlow MCP Server — Kubernetes Service
#
apiVersion: v1
kind: Service
metadata:
  name: glassflow-mcp
  namespace: glassflow          # CHANGEME: must match deployment namespace
  labels:
    app: glassflow-mcp
spec:
  type: ClusterIP
  selector:
    app: glassflow-mcp
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: sse
